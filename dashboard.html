<!-- templates/dashboard.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Cyber Guard Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: #eee; }
        h1 { color: #4CAF50; }
        pre { background-color: #222; padding: 10px; border-radius: 5px; }
        .section { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Cyber Guard Dashboard</h1>

    <div class="section">
        <h2>Recent Alerts</h2>
        <pre>
{% for line in alerts %}
{{ line }}
{% endfor %}
        </pre>
    </div>

    <div class="section">
        <h2>Blocked IPs</h2>
        <pre>
{% for ip in blocked_ips %}
{{ ip }}
{% endfor %}
        </pre>
    </div>
</body>
</html>
